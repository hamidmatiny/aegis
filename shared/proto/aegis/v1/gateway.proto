syntax = "proto3";

package aegis.v1;

option go_package = "github.com/aegis-platform/aegis/shared/gen/go/aegis/v1;aegisv1";

import "google/protobuf/timestamp.proto";
import "aegis/v1/common.proto";
import "aegis/v1/input_defense.proto";
import "aegis/v1/policy.proto";
import "aegis/v1/output_defense.proto";
import "aegis/v1/agent_gate.proto";
import "aegis/v1/audit.proto";

// ---------------------------------------------------------------------------
// Gateway — orchestrates the full defense-in-depth pipeline
// ---------------------------------------------------------------------------

enum GatewayResponseStatus {
  GATEWAY_RESPONSE_STATUS_UNSPECIFIED = 0;
  GATEWAY_RESPONSE_STATUS_OK = 1;
  GATEWAY_RESPONSE_STATUS_BLOCKED = 2;
  GATEWAY_RESPONSE_STATUS_TRANSFORMED = 3;
  GATEWAY_RESPONSE_STATUS_AWAITING_APPROVAL = 4;
  GATEWAY_RESPONSE_STATUS_UPSTREAM_ERROR = 5;
}

message GatewayResponse {
  GatewayResponseStatus status = 1;
  string content = 2;
  InputVerdict input_verdict = 3;
  PolicyDecision input_policy = 4;
  OutputVerdict output_verdict = 5;
  PolicyDecision output_policy = 6;
  AuditReceipt audit_receipt = 7;
  string error_message = 8;
  int64 total_latency_ms = 9;
}

message ChatCompletionRequest {
  Request request = 1;
  string tenant_id = 2;
}

message ChatCompletionResponse {
  GatewayResponse response = 1;
}

service GatewayService {
  rpc ChatCompletion(ChatCompletionRequest) returns (ChatCompletionResponse);
  rpc ChatCompletionStream(ChatCompletionRequest) returns (stream GatewayResponse);
  rpc Health(HealthCheckRequest) returns (HealthCheckResponse);
}
