name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: "1.22"
  PYTHON_VERSION: "3.12"
  # Fast CI: never download ~1GB ML weights on every PR.
  AEGIS_INPUT_DEFENSE_CLASSIFIER_BACKEND: stub
  AEGIS_INPUT_DEFENSE_PERPLEXITY_BACKEND: stub
  AEGIS_OUTPUT_DEFENSE_TOXICITY_BACKEND: stub
  AEGIS_OUTPUT_DEFENSE_PII_BACKEND: regex
  AEGIS_OUTPUT_DEFENSE_BACKTRANSLATION_BACKEND: stub
  AEGIS_OUTPUT_DEFENSE_JUDGE_BACKEND: stub

jobs:
  proto:
    name: Protobuf lint & codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - name: Lint protobuf
        run: cd shared && buf lint
      - name: Generate code
        run: cd shared && buf generate

  jsonschema:
    name: JSON Schema validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate schemas
        run: |
          npm install --no-save ajv@8 ajv-formats
          node scripts/validate-jsonschemas.mjs

  go:
    name: Go lint & test
    runs-on: ubuntu-latest
    needs: [proto]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            gateway/go.sum
            policy-engine/go.sum
            model-router/go.sum
            agent-gate/go.sum
            audit/go.sum
            shared/gen/go/go.sum
      - uses: bufbuild/buf-setup-action@v1
      - name: Generate protobuf
        run: cd shared && buf generate
      - name: Download gen/go modules
        run: cd shared/gen/go && go mod download
      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - name: Lint
        run: make lint-go
      - name: Test
        run: make test-go

  python:
    name: Python lint & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          for dir in input-defense output-defense redteam sdk/python; do
            pip install -e "./$dir[dev]"
          done
      - name: Lint
        run: make lint-python
      - name: Test
        run: make test-python

  ml-smoke:
    name: ML smoke (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install input-defense ML extras
        run: pip install -e "./input-defense[ml,dev]"
      - name: Run input-defense real-model smoke tests
        run: cd input-defense && pytest tests/test_ml_backends.py -s
      - name: Install output-defense ML extras
        run: |
          pip install -e "./output-defense[ml,dev]"
          python -m spacy download en_core_web_sm
      - name: Run output-defense real-model smoke tests
        run: cd output-defense && pytest tests/test_ml_backends.py -s

  integration:
    name: Integration smoke tests
    runs-on: ubuntu-latest
    needs: [go, python]
    steps:
      - uses: actions/checkout@v4
      - name: Start stack
        run: docker compose up -d --build --wait
      - name: Run smoke tests
        run: |
          chmod +x scripts/integration
          ./scripts/integration
      - name: Tear down
        if: always()
        run: docker compose down -v

  benchmark:
    name: Benchmark harness
    runs-on: ubuntu-latest
    needs: [integration]
    steps:
      - uses: actions/checkout@v4
      - name: Run benchmark scaffold
        run: |
          chmod +x scripts/benchmark.sh
          mkdir -p benchmark-results
          ./scripts/benchmark.sh
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-results/
