server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # __AUTH_BASIC__ "AEGIS Dashboard (dev)";
    # __AUTH_BASIC_FILE__ /etc/nginx/.htpasswd;

    location /api/audit/ {
        proxy_pass http://audit:8084/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/policy/ {
        proxy_pass http://policy-engine:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/agent-gate/ {
        proxy_pass http://agent-gate:8083/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /api/redteam/ {
        proxy_pass http://redteam:8092/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
