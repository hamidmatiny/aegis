services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis_dev}
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegis}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  gateway:
    build:
      context: .
      dockerfile: sdk/python/Dockerfile
    ports:
      - "${GATEWAY_HTTP_PORT:-8080}:8080"
    environment:
      AEGIS_SDK_PROXY_PORT: "8080"
      AEGIS_INPUT_DEFENSE_URL: http://input-defense:8090
      AEGIS_OUTPUT_DEFENSE_URL: http://output-defense:8091
      AEGIS_POLICY_ENGINE_URL: http://policy-engine:8081
      AEGIS_MODEL_ROUTER_URL: http://model-router:8082
      AEGIS_AGENT_GATE_URL: http://agent-gate:8083
      AEGIS_DEFAULT_MODEL: mock-model
    depends_on:
      input-defense:
        condition: service_started
      output-defense:
        condition: service_started
      policy-engine:
        condition: service_started
      model-router:
        condition: service_started
      agent-gate:
        condition: service_started

  policy-engine:
    build:
      context: .
      dockerfile: policy-engine/Dockerfile
    ports:
      - "${POLICY_ENGINE_PORT:-8081}:8081"
    environment:
      AEGIS_POLICY_ENGINE_PORT: "8081"
      AEGIS_POLICY_DIR: ${AEGIS_POLICY_DIR:-/etc/aegis/policies}
      AEGIS_AUDIT_URL: http://audit:8084
    volumes:
      - ./policy-engine/policies:/etc/aegis/policies:ro
    depends_on:
      audit:
        condition: service_started

  model-router:
    build:
      context: .
      dockerfile: model-router/Dockerfile
    ports:
      - "${MODEL_ROUTER_PORT:-8082}:8082"
    environment:
      AEGIS_MODEL_ROUTER_PORT: "8082"
      AEGIS_MODEL_ROUTER_CONFIG: /etc/aegis/model-router/providers.yaml
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}

  agent-gate:
    build:
      context: .
      dockerfile: agent-gate/Dockerfile
    ports:
      - "${AGENT_GATE_PORT:-8083}:8083"
    environment:
      AEGIS_AGENT_GATE_PORT: "8083"
      AEGIS_POLICY_ENGINE_URL: http://policy-engine:8081
      AEGIS_AUDIT_URL: http://audit:8084
      AEGIS_APPROVAL_TTL_HOURS: ${AEGIS_APPROVAL_TTL_HOURS:-24}
      DATABASE_URL: ${DATABASE_URL:-postgres://aegis:aegis_dev@postgres:5432/aegis?sslmode=disable}
    depends_on:
      policy-engine:
        condition: service_started
      audit:
        condition: service_started
      postgres:
        condition: service_healthy

  audit:
    build:
      context: .
      dockerfile: audit/Dockerfile
    ports:
      - "${AUDIT_PORT:-8084}:8084"
    environment:
      AEGIS_AUDIT_PORT: "8084"
      DATABASE_URL: ${DATABASE_URL:-postgres://aegis:aegis_dev@postgres:5432/aegis?sslmode=disable}
      # Dev-only stable seed (32 bytes base64). Override in production.
      AEGIS_AUDIT_SIGNING_KEY: ${AEGIS_AUDIT_SIGNING_KEY:-YWVnaXMtZGV2LWF1ZGl0LXNpZ25pbmcta2V5LXYxISE=}
      AEGIS_AUDIT_SIGNING_KEY_ID: ${AEGIS_AUDIT_SIGNING_KEY_ID:-dev-key-1}
    depends_on:
      postgres:
        condition: service_healthy

  input-defense:
    build:
      context: .
      dockerfile: input-defense/Dockerfile
      args:
        INSTALL_ML: ${AEGIS_INPUT_DEFENSE_INSTALL_ML:-false}
    ports:
      - "${INPUT_DEFENSE_PORT:-8090}:8090"
    environment:
      AEGIS_AUDIT_URL: http://audit:8084
      AEGIS_INPUT_DEFENSE_CLASSIFIER_BACKEND: ${AEGIS_INPUT_DEFENSE_CLASSIFIER_BACKEND:-stub}
      AEGIS_INPUT_DEFENSE_PERPLEXITY_BACKEND: ${AEGIS_INPUT_DEFENSE_PERPLEXITY_BACKEND:-stub}
    depends_on:
      audit:
        condition: service_started

  output-defense:
    build:
      context: .
      dockerfile: output-defense/Dockerfile
    ports:
      - "${OUTPUT_DEFENSE_PORT:-8091}:8091"
    environment:
      AEGIS_OUTPUT_DEFENSE_PORT: "8091"
      AEGIS_AUDIT_URL: http://audit:8084
    depends_on:
      audit:
        condition: service_started

  redteam:
    build:
      context: .
      dockerfile: redteam/Dockerfile
    ports:
      - "${REDTEAM_PORT:-8092}:8092"
    environment:
      AEGIS_REDTEAM_PORT: "8092"
      AEGIS_REDTEAM_INPUT_DEFENSE_URL: http://input-defense:8090
      AEGIS_REDTEAM_OUTPUT_DEFENSE_URL: http://output-defense:8091
      DATABASE_URL: ${DATABASE_URL:-postgres://aegis:aegis_dev@postgres:5432/aegis?sslmode=disable}
    depends_on:
      input-defense:
        condition: service_started
      output-defense:
        condition: service_started
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      audit:
        condition: service_started
      policy-engine:
        condition: service_started
      agent-gate:
        condition: service_started
      redteam:
        condition: service_started

volumes:
  postgres_data:
